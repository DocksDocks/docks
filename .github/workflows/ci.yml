name: validate

# Triggers:
#   - pull_request: validate before merge into main
#   - push: tags: validate every release tag (release.sh creates the GH Release
#     only if this run succeeds — tag-CI is the gate)
#   - workflow_dispatch: manual run for ad-hoc validation

on:
  pull_request:
    branches: [main]
  push:
    tags:
      - 'docks--v*'
  workflow_dispatch:

jobs:
  guard:
    name: "guards (structural validation)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: "guard-skills"
        run: bash scripts/guard-skills.sh
      - name: "guard-agents"
        run: bash scripts/guard-agents.sh
      - name: "guard-tree"
        run: bash scripts/guard-tree.sh

  score:
    name: "scores (quality floors)"
    runs-on: ubuntu-latest
    needs: guard
    steps:
      - uses: actions/checkout@v5
      # Floor = artifact_count × per-file scoring floor.
      # Count-derived so adding or removing a skill/command/agent doesn't require
      # editing this workflow — the floor tracks the inventory automatically.
      - name: "score-skills (floor = N × 8)"
        run: |
          count=$(find plugins/docks/skills -mindepth 1 -maxdepth 1 -type d | wc -l)
          floor=$((count * 8))
          score=$(bash scripts/score-skills.sh)
          echo "score-skills total: $score (floor $floor = $count × 8)"
          [ "$score" -ge "$floor" ] || { echo "::error::skills score $score below floor $floor ($count × 8)"; exit 1; }
      - name: "score-agents (floor = N × 14)"
        run: |
          # Exclude reserved context-tree node files (AGENTS.md/CLAUDE.md) — not agents.
          # Mirrors scripts/ci.sh so local and tag-CI agree on the agent count.
          count=$(find plugins/docks/agents -mindepth 1 -maxdepth 1 -name '*.md' ! -name AGENTS.md ! -name CLAUDE.md | wc -l)
          floor=$((count * 14))
          score=$(bash scripts/score-agents.sh)
          echo "score-agents total: $score (floor $floor = $count × 14)"
          [ "$score" -ge "$floor" ] || { echo "::error::agents score $score below floor $floor ($count × 14)"; exit 1; }

  per-file-floors:
    name: "per-file score floors"
    runs-on: ubuntu-latest
    needs: guard
    steps:
      - uses: actions/checkout@v5
      - name: "skills (floor 8 per-file)"
        run: |
          fail=0
          while IFS= read -r line; do
            score=$(echo "$line" | awk '{print $NF}')
            name=$(echo "$line" | awk '{$NF=""; print $0}' | sed 's/[[:space:]]*$//')
            if [ "$score" -lt 8 ]; then
              echo "::error::skill $name score $score below per-file floor 8"
              fail=1
            fi
          done < <(bash scripts/score-skills.sh --per-file)
          [ "$fail" -eq 0 ]
      - name: "agents (floor 14 per-file)"
        run: |
          fail=0
          while IFS= read -r line; do
            score=$(echo "$line" | awk '{print $NF}')
            name=$(echo "$line" | awk '{$NF=""; print $0}' | sed 's/[[:space:]]*$//')
            if [ "$score" -lt 14 ]; then
              echo "::error::agent $name score $score below per-file floor 14"
              fail=1
            fi
          done < <(bash scripts/score-agents.sh --per-file)
          [ "$fail" -eq 0 ]

  plugin-validate:
    name: "claude plugin validate"
    runs-on: ubuntu-latest
    needs: guard
    steps:
      - uses: actions/checkout@v5
      - name: "install Claude Code"
        run: npm install -g @anthropic-ai/claude-code
      - name: "validate plugin manifest"
        run: claude plugin validate ./plugins/docks

  scaffold:
    name: "scaffold spec + render smoke"
    runs-on: ubuntu-latest
    needs: guard
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: "install pyyaml (spec parsing)"
        run: pip install pyyaml
      - name: "guard-scaffold-spec (spec coherent; paths resolve)"
        run: bash scripts/guard-scaffold-spec.sh
      - name: "test-scaffold (templates render to a valid skeleton)"
        run: bash scripts/test-scaffold.sh
