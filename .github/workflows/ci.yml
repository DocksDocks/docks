name: validate

# Triggers:
#   - pull_request: validate before merge into main
#   - push: tags: validate every release tag (release.sh creates the GH Release
#     only if this run succeeds — tag-CI is the gate)
#   - workflow_dispatch: manual run for ad-hoc validation

on:
  pull_request:
    branches: [main]
  push:
    tags:
      - 'docks--v*'
  workflow_dispatch:

jobs:
  guard:
    name: "guards (structural validation)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "guard-skills"
        run: bash scripts/guard-skills.sh
      - name: "guard-commands"
        run: bash scripts/guard-commands.sh
      - name: "guard-agents"
        run: bash scripts/guard-agents.sh

  score:
    name: "scores (quality floors)"
    runs-on: ubuntu-latest
    needs: guard
    steps:
      - uses: actions/checkout@v4
      - name: "score-skills (floor 90 total)"
        run: |
          score=$(bash scripts/score-skills.sh)
          echo "score-skills total: $score"
          [ "$score" -ge 90 ] || { echo "::error::skills score $score below floor 90"; exit 1; }
      - name: "score-commands (floor 150 total)"
        run: |
          score=$(bash scripts/score-commands.sh)
          echo "score-commands total: $score"
          [ "$score" -ge 150 ] || { echo "::error::commands score $score below floor 150"; exit 1; }
      - name: "score-agents (floor 560 total)"
        run: |
          score=$(bash scripts/score-agents.sh)
          echo "score-agents total: $score"
          [ "$score" -ge 560 ] || { echo "::error::agents score $score below floor 560"; exit 1; }

  per-file-floors:
    name: "per-file score floors"
    runs-on: ubuntu-latest
    needs: guard
    steps:
      - uses: actions/checkout@v4
      - name: "skills (floor 8 per-file)"
        run: |
          fail=0
          while IFS= read -r line; do
            score=$(echo "$line" | awk '{print $NF}')
            name=$(echo "$line" | awk '{$NF=""; print $0}' | sed 's/[[:space:]]*$//')
            if [ "$score" -lt 8 ]; then
              echo "::error::skill $name score $score below per-file floor 8"
              fail=1
            fi
          done < <(bash scripts/score-skills.sh --per-file)
          [ "$fail" -eq 0 ]
      - name: "commands (floor 17 per-file)"
        run: |
          fail=0
          while IFS= read -r line; do
            score=$(echo "$line" | awk '{print $NF}')
            name=$(echo "$line" | awk '{$NF=""; print $0}' | sed 's/[[:space:]]*$//')
            if [ "$score" -lt 17 ]; then
              echo "::error::command $name score $score below per-file floor 17"
              fail=1
            fi
          done < <(bash scripts/score-commands.sh --per-file)
          [ "$fail" -eq 0 ]
      - name: "agents (floor 11 per-file)"
        run: |
          fail=0
          while IFS= read -r line; do
            score=$(echo "$line" | awk '{print $NF}')
            name=$(echo "$line" | awk '{$NF=""; print $0}' | sed 's/[[:space:]]*$//')
            if [ "$score" -lt 11 ]; then
              echo "::error::agent $name score $score below per-file floor 11"
              fail=1
            fi
          done < <(bash scripts/score-agents.sh --per-file)
          [ "$fail" -eq 0 ]

  plugin-validate:
    name: "claude plugin validate"
    runs-on: ubuntu-latest
    needs: guard
    steps:
      - uses: actions/checkout@v4
      - name: "install Claude Code"
        run: npm install -g @anthropic-ai/claude-code
      - name: "validate plugin manifest"
        run: claude plugin validate ./plugins/docks
