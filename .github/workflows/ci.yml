name: validate

# Triggers:
#   - pull_request: validate before merge into main
#   - push: tags: validate every release tag (release.sh creates the GH Release
#     only if this run succeeds — tag-CI is the gate)
#   - workflow_dispatch: manual run for ad-hoc validation

on:
  pull_request:
    branches: [main]
  push:
    tags:
      - '*--v*'   # any <plugin>--v<version> release tag (docks--v*, session-relay--v*, ...)
  workflow_dispatch:

# Least privilege: the single validator job is read-only.
permissions:
  contents: read

jobs:
  validate:
    name: "validate (scripts/ci.mjs)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
      - name: "enable corepack"
        run: corepack enable
      - name: "install pnpm dependencies (frozen-lockfile: yaml + lockfile-pinned claude-code)"
        run: pnpm install --frozen-lockfile
      - name: "verify registry signatures (non-blocking)"
        continue-on-error: true
        run: npm audit signatures
      - name: "materialize claude-code binary (allowBuilds denies it by default)"
        run: node node_modules/@anthropic-ai/claude-code/install.cjs
      - name: "add node_modules/.bin to PATH (so ci.mjs finds the pinned claude)"
        run: echo "$GITHUB_WORKSPACE/node_modules/.bin" >> "$GITHUB_PATH"
      - name: "run the full gate (ci.mjs) — guards, scores, manifests, plugin validate, scaffold, shellcheck"
        run: node scripts/ci.mjs
