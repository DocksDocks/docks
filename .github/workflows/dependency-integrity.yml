name: dependency integrity

on:
  workflow_dispatch:
  schedule:
    - cron: '17 7 * * 1'

permissions:
  contents: read

jobs:
  audit:
    name: verify registry signatures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: "setup Node 24"
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
      - name: "enable corepack"
        run: corepack enable
      - name: "configure deterministic pnpm store"
        run: pnpm config set store-dir "$HOME/.pnpm-store"
      - name: "cache pnpm store"
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.pnpm-store
          key: pnpm-v11-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pnpm-lock.yaml', 'package.json') }}
          restore-keys: pnpm-v11-${{ runner.os }}-${{ runner.arch }}-
      - name: "install pnpm dependencies (--frozen-lockfile)"
        run: pnpm install --frozen-lockfile
      - name: "verify registry signatures"
        run: npm audit signatures
