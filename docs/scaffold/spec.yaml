# scaffold spec — what `scaffold <target>` seeds into a new docks-style plugin.
# Schema: plugins/docks/skills/productivity/scaffold/references/spec-schema.md
# Validated by scripts/scaffold/guard-spec.sh (paths resolve) + scripts/scaffold/test.sh (templates render).
version: 1

plugin:
  name_placeholder: "{{ plugin_name }}"
  license: MIT

# Variable-substituted files rendered into the new project (dest may contain {{ var }}).
templated_files:
  - { template: plugin.json.template,            dest: "plugins/{{ plugin_name }}/.claude-plugin/plugin.json" }
  - { template: codex-plugin.json.template,      dest: "plugins/{{ plugin_name }}/.codex-plugin/plugin.json" }
  - { template: marketplace.json.template,       dest: ".claude-plugin/marketplace.json" }
  - { template: codex-marketplace.json.template, dest: ".agents/plugins/marketplace.json" }
  - { template: package.json.template,          dest: "package.json" }
  - { template: pnpm-lock.yaml.template,        dest: "pnpm-lock.yaml" }
  - { template: root-AGENTS.md.template,         dest: "AGENTS.md" }
  - { template: root-CLAUDE.md.template,         dest: "CLAUDE.md" }
  - { template: gitignore.template,              dest: ".gitignore" }
  - { template: ci.sh.template,                  dest: "scripts/ci.sh" }
  - { template: release.sh.template,             dest: "scripts/release.sh" }

# Context-tree node pairs (each gets AGENTS.md + one-line CLAUDE.md). Exactly one seed source per node.
tree_nodes:
  - { path: "docs/plans", seed_from_skill: plan-init }
  - { path: "plugins/{{ plugin_name }}/skills", template: "node-templates/skills-AGENTS.md" }
  - { path: "scripts", template: "node-templates/scripts-AGENTS.md" }
  - { path: "docs/scaffold", seed: { type: self-reference } }

# Skills copied verbatim from this repo (pinned to its revision).
bundled_skills:
  - { source: plugins/docks/skills/productivity/context-tree }
  - { source: plugins/docks/skills/productivity/plan-init }
  - { source: plugins/docks/skills/productivity/plan-manager }
  - { source: plugins/docks/skills/productivity/plan-review }
  - { source: plugins/docks/skills/productivity/write-skill }

# Validator scripts copied verbatim. They accept a path arg, so the seeded project
# invokes them against its own plugins/<name>/skills (see scripts/AGENTS.md template).
scripts:
  - { source: scripts/lib/skills.sh }
  - { source: scripts/lib/validate-skills.mjs }
  - { source: scripts/skills/guard.sh }
  - { source: scripts/skills/codex-facts.sh }
  - { source: scripts/skills/codex.sh }
  - { source: scripts/skills/claude.sh }
  - { source: scripts/skills/score.sh }
  - { source: scripts/skills/content-hash.sh }
  - { source: scripts/config/read-floor.sh }
  - { source: scripts/config/scoring.json }
  - { source: scripts/tree/guard.sh }

variables:
  plugin_name:        { prompt: "Plugin name (kebab-case, not 'docks')" }
  plugin_description: { prompt: "Short description" }
  author_name:        { prompt: "Author name",  default_from: "git config user.name" }
  author_email:       { prompt: "Author email", default_from: "git config user.email" }
  license:            { prompt: "License", default: MIT }
