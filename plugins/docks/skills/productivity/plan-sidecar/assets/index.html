<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Plans</title>
  <link rel="stylesheet" href="_assets/dashboard.css" />
</head>
<body class="dashboard">
  <h1>Plans</h1>

  <!-- Static skeleton: rows, filter options, and age tokens render client-side
       from _assets/plans-data.js. Update THAT file, not this one. -->
  <div class="filters">
    <input type="search" data-filter="search" placeholder="filter…" />
    <select data-filter="status">
      <option value="">all statuses</option>
      <option value="planned">planned</option>
      <option value="ongoing">ongoing</option>
      <option value="blocked">blocked</option>
      <option value="scheduled">scheduled</option>
      <option value="finished">finished</option>
    </select>
    <select data-filter="assignee">
      <option value="">all assignees</option>
    </select>
    <select data-filter="tag">
      <option value="">all tags</option>
    </select>
  </div>

  <table class="plans-table">
    <thead>
      <tr>
        <th data-sort="status">Status</th>
        <th data-sort="title">Title</th>
        <th data-sort="age">Age</th>
        <th data-sort="assignee">Assignee</th>
        <th data-sort="progress">Steps</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <noscript><p>This dashboard renders from <code>_assets/plans-data.js</code> and needs JavaScript. The canonical plan files live in the category directories (<code>planned/</code>, <code>ongoing/</code>, <code>blocked/</code>, <code>scheduled/</code>, <code>finished/</code>).</p></noscript>

  <script src="_assets/plans-data.js"></script>
  <script src="_assets/dashboard.js"></script>
</body>
</html>
